<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Name Input</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
    :root {
      --background: #0F0F13;
      --surface: #1C1C24;
      --border: #32323E;
      --text-primary: #F2F2F7;
      --text-secondary: #8E8E93;
      --text-tertiary: #56566A;
      --accent: #7C6AF4;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--text-primary);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex items-center justify-center bg-[var(--background)]">
<div class="w-[375px] h-[812px] bg-[var(--background)] relative overflow-hidden shadow-2xl rounded-[40px] border border-[var(--border)] flex flex-col">
<div class="h-12 w-full"></div>
<div class="flex justify-center gap-2 mt-4">
<div class="w-2 h-2 rounded-full bg-[var(--accent)]"></div>
<div class="w-2 h-2 rounded-full bg-[var(--border)]"></div>
<div class="w-2 h-2 rounded-full bg-[var(--border)]"></div>
</div>
<div class="flex-1 px-6 flex flex-col pt-12">
<h1 class="text-[24px] leading-[32px] font-bold text-[var(--text-primary)] text-center mb-8">
        Como podemos te chamar?
      </h1>
<div class="mb-8">
<input class="w-full h-14 bg-[var(--surface)] border-[1.5px] border-[var(--border)] rounded-xl px-4 text-[16px] text-[var(--text-primary)] placeholder-[var(--text-tertiary)] focus:border-[var(--accent)] focus:ring-0 outline-none transition-colors" placeholder="Seu nome" type="text"/>
</div>
<div class="flex flex-col gap-4 mt-auto mb-10">
<button class="w-full h-14 bg-[var(--accent)] text-white font-semibold text-[16px] rounded-2xl flex items-center justify-center opacity-40 cursor-not-allowed">
          Próximo
        </button>
<button class="w-full py-2 text-[var(--text-secondary)] font-normal text-[14px] flex items-center justify-center">
          Voltar
        </button>
</div>
</div>
<div class="h-8 w-full"></div>
</div>

</body></html>
