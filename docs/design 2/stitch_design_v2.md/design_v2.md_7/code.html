<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gerenciar Matérias - Grade App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
    :root {
      --background: #0F0F13;
      --surface: #1C1C24;
      --surface-elevated: #262630;
      --border: #32323E;
      --text-primary: #F2F2F7;
      --text-secondary: #8E8E93;
      --text-tertiary: #56566A;
      --accent: #7C6AF4;
      --danger: #FF5C5C;
      --safe-area-top: 48px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--background);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="w-[390px] h-[844px] mx-auto border border-[var(--border)] overflow-hidden flex flex-col relative bg-[var(--background)]">
<header class="pt-[var(--safe-area-top)] px-6 pb-4 flex items-center gap-3 bg-[var(--background)] z-10 sticky top-0">
<button class="w-8 h-8 flex items-center justify-center text-[var(--text-primary)] -ml-1">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-[24px] font-bold leading-[32px] text-[var(--text-primary)] tracking-tight">Matérias</h1>
</header>
<main class="flex-1 overflow-y-auto px-6 pb-24 flex flex-col gap-3">
<div class="bg-[var(--surface)] rounded-[12px] p-4 flex items-center">
<div class="w-3.5 h-3.5 rounded-full bg-[#FF6B6B] shrink-0"></div>
<div class="ml-3.5 flex-1 flex flex-col">
<h3 class="text-[17px] font-semibold text-[var(--text-primary)] leading-[24px]">Cálculo I</h3>
<p class="text-[14px] text-[var(--text-secondary)] leading-[20px] mt-0.5">Seg, Qua · 08:00 - 09:40</p>
</div>
<div class="flex items-center gap-4 ml-4 shrink-0">
<button class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="text-[var(--danger)] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<div class="bg-[var(--surface)] rounded-[12px] p-4 flex items-center">
<div class="w-3.5 h-3.5 rounded-full bg-[#7C6AF4] shrink-0"></div>
<div class="ml-3.5 flex-1 flex flex-col">
<h3 class="text-[17px] font-semibold text-[var(--text-primary)] leading-[24px]">Algoritmos</h3>
<p class="text-[14px] text-[var(--text-secondary)] leading-[20px] mt-0.5">Ter, Qui · 10:00 - 11:40</p>
</div>
<div class="flex items-center gap-4 ml-4 shrink-0">
<button class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="text-[var(--danger)] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<div class="bg-[var(--surface)] rounded-[12px] p-4 flex items-center">
<div class="w-3.5 h-3.5 rounded-full bg-[#34C78B] shrink-0"></div>
<div class="ml-3.5 flex-1 flex flex-col">
<h3 class="text-[17px] font-semibold text-[var(--text-primary)] leading-[24px]">Física Geral</h3>
<p class="text-[14px] text-[var(--text-secondary)] leading-[20px] mt-0.5">Sex · 08:00 - 11:40</p>
</div>
<div class="flex items-center gap-4 ml-4 shrink-0">
<button class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
<button class="text-[var(--danger)] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<button class="h-[56px] w-full rounded-[12px] border-2 border-dashed border-[var(--border)] flex items-center justify-center gap-2 mt-2 bg-transparent hover:bg-[var(--surface)] transition-colors">
<span class="material-symbols-outlined text-[20px] text-[var(--text-tertiary)]">add</span>
<span class="text-[14px] text-[var(--text-tertiary)] font-medium">Adicionar matéria</span>
</button>
</main>
<div class="absolute bottom-2 left-0 right-0 flex justify-center pointer-events-none">
<div class="w-[134px] h-[5px] bg-white/20 rounded-full"></div>
</div>

</body></html>
