<!DOCTYPE html>
<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grade - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
                -webkit-tap-highlight-color: transparent;
            }
        }
        :root {
            --background-start: #0D0D0F;
            --background-end: #1A1A2E;
            --surface: #1A1A1F;
            --text-primary: #F5F5F7;
            --text-secondary: #8E8E93;
            --text-tertiary: #636366;
            --accent: #6C5CE7;
            --accent-light: #A29BFE;
            --border: #2E2E35;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0D0D0F] text-[var(--text-primary)] min-h-screen flex flex-col justify-center items-center overflow-hidden">
<div class="fixed inset-0 bg-gradient-to-b from-[var(--background-start)] to-[var(--background-end)] -z-10"></div>
<div class="w-full max-w-[402px] h-screen max-h-[874px] flex flex-col px-8 pb-12 pt-20">
<div class="flex-1 flex flex-col items-center justify-center text-center space-y-10">
<div class="relative w-32 h-32 flex items-center justify-center">
<div class="absolute inset-0 bg-[var(--accent)] opacity-20 blur-2xl rounded-full"></div>
<div class="relative grid grid-cols-3 gap-2 w-24 h-24 p-1">
<div class="bg-[var(--accent)] rounded-sm opacity-40"></div>
<div class="bg-[var(--accent)] rounded-sm"></div>
<div class="bg-[var(--accent)] rounded-sm opacity-60"></div>
<div class="bg-[var(--accent-light)] rounded-sm"></div>
<div class="bg-[var(--accent)] rounded-sm opacity-30"></div>
<div class="bg-[var(--accent-light)] rounded-sm opacity-80"></div>
<div class="bg-[var(--accent)] rounded-sm opacity-70"></div>
<div class="bg-[var(--accent)] rounded-sm opacity-50"></div>
<div class="bg-[var(--accent-light)] rounded-sm"></div>
</div>
</div>
<div class="space-y-4">
<h1 class="text-[28px] font-bold tracking-tight text-[var(--text-primary)]">
                    Grade
                </h1>
<p class="text-[16px] leading-relaxed text-[var(--text-secondary)] px-4">
                    Sua rotina acadêmica no bolso. Anotações, código e prazos em um só lugar.
                </p>
</div>
</div>
<div class="flex flex-col items-center space-y-6">
<button class="w-full py-4 bg-[var(--accent)] hover:bg-[var(--accent-light)] text-white text-[16px] font-semibold rounded-full transition-colors active:scale-[0.98]">
                Começar
            </button>
<a class="text-[12px] font-medium text-[var(--text-tertiary)] underline decoration-[var(--text-tertiary)] underline-offset-4 active:opacity-70" href="#">
                Pular e configurar depois
            </a>
<div class="flex space-x-2 pt-4">
<div class="w-2 h-2 rounded-full bg-[var(--accent)]"></div>
<div class="w-2 h-2 rounded-full bg-[var(--border)]"></div>
<div class="w-2 h-2 rounded-full bg-[var(--border)]"></div>
<div class="w-2 h-2 rounded-full bg-[var(--border)]"></div>
</div>
</div>
</div>
<div class="fixed bottom-2 w-32 h-1 bg-white/20 rounded-full left-1/2 -translate-x-1/2"></div>

</body></html>
